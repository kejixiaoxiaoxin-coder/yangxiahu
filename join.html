<!DOCTYPE html>

        body {

            color: #e5e5e5;

        }
        
        .header-bg {
            background-color: #0a0a0a;
            border-color: #27272a;
        }
        
        .nav-link {
            color: #9ca3af;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .nav-link:hover {
            color: #fff;
        }
        
        .card-gradient { 
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            border: 1px solid #262626;
        }
        .card-gradient:hover {
            border-color: #3f3f46;
        }
        
        .icon-glass {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }
        
        .btn-primary { 
            background: linear-gradient(to right, #e63e31, #f15a42); 
            box-shadow: 0 4px 15px rgba(230, 62, 49, 0.4); 
            transition: all 0.3s ease; 
        }
        .btn-primary:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(230, 62, 49, 0.6); 
        }
        
        .bg-text-decoration { 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 20vw; 
            font-weight: 900; 
            color: rgba(255, 255, 255, 0.03); 
            white-space: nowrap; 
            z-index: 0; 
            pointer-events: none; 
            user-select: none;
