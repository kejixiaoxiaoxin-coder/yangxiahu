<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>加入社区 - 养虾户</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            overflow-x: hidden; 
        }
        .bg-text-decoration { 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 20vw; 
            font-weight: 900; 
            color: rgba(255, 255, 255, 0.03); 
            white-space: nowrap; 
            z-index: 0; 
            pointer-events: none; 
            user-select: none; 
        }
        .nav-glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .card-glass { 
            background: linear-gradient(145deg, rgba(30, 30, 30, 0.9), rgba(15, 15, 15, 0.95)); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
        }
        .btn-tg { 
            background: linear-gradient(to right, #e63e31, #f15a42); 
            box-shadow: 0 4px 15px rgba(230, 62, 49, 0.4); 
            transition: all 0.3s ease; 
        }
        .btn-tg:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(230, 62, 49, 0.6); 
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">
    <div class="bg-text-decoration">Community</div>

    <nav class="mt-8 px-6 py-2 rounded-full nav-glass flex items-center gap-8 z-20">

            <!-- Stats -->

    <!-- Footer -->
    <footer class="py-8 text-center text-gray-600 text-sm z-10">
        <p>© 2026 养虾户 🦐</p>
    </footer>
</body>
</html>
