    <script>
        // Product prices
        const prices = {
            'wechat': '9.9',

        // Simple QR code generation (placeholder)
        function generateQR(text) {
            // Using a simple QR code API
            return `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(text)}" alt="QR Code" class="w-full h-full">`;
        }
        
        function showPayment(method) {
            const modal = document.getElementById('paymentModal');
            const title = document.getElementById('paymentTitle');
            const qrCode = document.getElementById('qrCode');
            const price = document.getElementById('price');
            
            if (method === 'wechat') {

                qrCode.innerHTML = generateQR('weixin://wxpay/bizpayurl?pr=EXAMPLE');
                price.textContent = prices.wechat;
            } else if (method === 'alipay') {
                title.textContent = 'ж”Ҝд»ҳе®қж”Ҝд»ҳ';
                qrCode.innerHTML = generateQR('alipay://platformapi/startapp?appId=20000067');
                price.textContent = prices.alipay;
            }
            
            modal.classList.remove('hidden');
        }
        
        function closePayment() {
